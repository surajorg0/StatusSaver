        <circle cx="256" cy="256" r="196" fill="none" stroke="#4ECDC4" stroke-width="18" stroke-dasharray="219 1013" stroke-linecap="round" transform="rotate(54,256,256)"/>
        <circle cx="256" cy="256" r="196" fill="none" stroke="#C084FC" stroke-width="18" stroke-dasharray="219 1013" stroke-linecap="round" transform="rotate(126,256,256)"/>
        <circle cx="256" cy="256" r="196" fill="none" stroke="#60A5FA" stroke-width="18" stroke-dasharray="219 1013" stroke-linecap="round" transform="rotate(198,256,256)"/>
        <!-- Phone body -->
        <rect x="178" y="120" width="156" height="272" rx="26" fill="white"/>
        <rect x="190" y="136" width="132" height="222" rx="14" fill="#0B5E49"/>
        <rect x="224" y="124" width="64" height="16" rx="8" fill="#CBD5E1"/>
        <rect x="218" y="372" width="76" height="6" rx="3" fill="#CBD5E1"/>
