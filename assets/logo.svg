        <polyline points="231,215 256,246 281,215" fill="none" stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="230" y1="265" x2="282" y2="265" stroke="white" stroke-width="11" stroke-linecap="round"/>
        <!-- Green save badge -->
