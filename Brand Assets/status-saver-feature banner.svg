      <rect x="680" y="54" width="190" height="290" rx="22" fill="#1D5E46"/>
      <!-- Status bars at top -->
      <rect x="688" y="62" width="44" height="5" rx="2.5" fill="white" opacity="0.85"/>
      <rect x="738" y="62" width="44" height="5" rx="2.5" fill="white" opacity="0.45"/>
      <rect x="788" y="62" width="44" height="5" rx="2.5" fill="white" opacity="0.25"/>
      <rect x="838" y="62" width="20" height="5" rx="2.5" fill="white" opacity="0.15"/>
      <!-- Profile -->
      <circle cx="702" cy="90" r="15" fill="#FF6B8A"/>
      <text x="722" y="86" fill="white" font-family="sans-serif" font-size="12" font-weight="600">Sneha</text>
      <text x="722" y="100" fill="white" font-family="sans-serif" font-size="10" opacity="0.65">1 hour ago</text>
      <!-- Photo area (simulated landscape status) -->
      <rect x="680" y="110" width="190" height="190" fill="#1A6B50"/>
      <ellipse cx="775" cy="148" rx="32" ry="32" fill="#FFD93D" opacity="0.9"/>
      <rect x="680" y="215" width="190" height="85" fill="#1D8A60" opacity="0.8"/>
      <path d="M680,230 Q720,200 775,230 Q820,260 870,230 L870,300 L680,300Z" fill="#175C42" opacity="0.9"/>
      <!-- Download overlay -->
      <rect x="680" y="296" width="190" height="48" rx="0" fill="black" opacity="0.55"/>
      <rect x="720" y="306" width="110" height="28" rx="14" fill="#25D366"/>
      <text x="775" y="325" fill="white" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">Save Status</text>
      <!-- Bottom of screen -->
      <rect x="680" y="400" width="190" height="48" rx="0" fill="#0C1F1A"/>
      <rect x="740" y="416" width="70" height="5" rx="2.5" fill="white" opacity="0.25"/>
      <!-- Notch -->
      <rect x="740" y="40" width="70" height="18" rx="9" fill="#0D1F18"/>
      <!-- Phone buttons -->
      <rect x="658" y="140" width="7" height="44" rx="3.5" fill="#0F2820"/>
      <rect x="658" y="194" width="7" height="44" rx="3.5" fill="#0F2820"/>
      <rect x="881" y="158" width="7" height="60" rx="3.5" fill="#0F2820"/>

      <!-- Save badge floating -->
      <circle cx="636" cy="220" r="30" fill="#1A8F5C"/>
      <circle cx="636" cy="220" r="25" fill="#25D366"/>
      <polyline points="622,220 632,231 651,209" fill="none" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>