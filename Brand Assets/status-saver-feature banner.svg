      <rect x="592" y="270" width="170" height="52" rx="0" fill="black" opacity="0.45"/>
      <rect x="620" y="280" width="114" height="30" rx="15" fill="#25D366"/>
      <text x="677" y="300" fill="white" font-family="sans-serif" font-size="13" font-weight="700" text-anchor="middle">Save</text>

      <!-- Main phone (front) -->
      <rect x="670" y="40" width="210" height="420" rx="32" fill="#162C26"/>
      <rect x="680" y="54" width="190" height="394" rx="22" fill="#0C1F1A"/>
